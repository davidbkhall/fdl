site_name: ASC FDL

theme:
  name: material
  palette:
    scheme: default
  features:
    - content.tabs.link
    - content.code.copy

plugins:
  - search
  - autorefs
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          options:
            show_source: false
            inherited_members: true
            members_order: "alphabetical"
            group_by_category: true
            show_root_heading: true
            show_submodules: false
            merge_init_into_class: true
            allow_inspection: false

markdown_extensions:
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
