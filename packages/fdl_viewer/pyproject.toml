[project]
name = "fdl-viewer"
version = "2.0.1"
description = "PySide6-based FDL Viewer application for viewing and transforming Framing Decision List files"
license = "Apache-2.0"
requires-python = ">=3.10"
dependencies = [
    "PySide6>=6.5.0",
    "fdl",
    "fdl-imaging",
    "openimageio",
    "numpy",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0",
    "pytest-qt>=4.0",
    "pytest-cov>=4.0",
]
build = [
    "pyinstaller>=5.0",
]

[project.gui-scripts]
fdl-viewer = "fdl_viewer.main:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/fdl_viewer"]

[tool.ruff]
line-length = 140
src = ["src", "tests"]

[tool.ruff.lint]
select = ["F", "E", "W", "I", "UP", "RUF"]

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_functions = ["test_*"]
addopts = "-v -p no:xdist"
