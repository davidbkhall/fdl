[project]
name = "fdl-imaging"
version = "0.1.0"
description = "FDL-based image processing using OpenImageIO"
license = "Apache-2.0"
requires-python = ">=3.10"
dependencies = [
    "fdl",
    "OpenImageIO>=2.4.0",
]

[project.optional-dependencies]
dev = ["pytest>=7.0"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/fdl_imaging"]

[tool.ruff]
line-length = 140
src = ["src", "tests"]

[tool.ruff.lint]
select = ["F", "E", "W", "I", "UP", "RUF"]
