name: Cleanup Workflow Artifacts

on:
  schedule:
    - cron: '30 0 * * *'
  workflow_dispatch: {}

permissions:
  actions: write

jobs:
  cleanup:
    name: Delete expired artifacts
    runs-on: ubuntu-latest
    steps:
      - name: Delete old workflow artifacts
        uses: actions/github-script@v7
        with:
          script: |
            const maxAgeDays = 2;
            const cutoff = Date.now() - maxAgeDays * 24 * 60 * 60 * 1000;

            let page = 1;
            let deleted = 0;

            while (true) {
              const { data: artifacts } = await github.rest.actions.listArtifactsForRepo({
                owner: context.repo.owner,
                repo: context.repo.repo,
                per_page: 100,
                page,
              });

              if (artifacts.artifacts.length === 0) break;

              for (const artifact of artifacts.artifacts) {
                const createdAt = new Date(artifact.created_at).getTime();
                if (createdAt < cutoff) {
                  console.log(`Deleting: ${artifact.name} (${artifact.created_at})`);
                  await github.rest.actions.deleteArtifact({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    artifact_id: artifact.id,
                  });
                  deleted++;
                }
              }

              page++;
            }

            console.log(`Deleted ${deleted} artifact(s).`);
