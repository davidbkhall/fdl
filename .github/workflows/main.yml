name: CI/CD Workflow

permissions:
  contents: write
  checks: write

on:
  push:
    branches:
      - '**'
    tags:
      - 'v*'
  pull_request:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch: {}

jobs:
  # ---------------------------------------------------------------------------
  # Lint — fast gate before tests
  # ---------------------------------------------------------------------------
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Run ruff check
        run: uvx ruff check .

      - name: Run ruff format check
        run: uvx ruff format --check .

  # ---------------------------------------------------------------------------
  # Tests — gate for all downstream jobs
  # ---------------------------------------------------------------------------
  test:
    name: Tests (${{ matrix.os }})
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]

    runs-on: ${{ matrix.os }}
    env:
      CI: true
      CICD: "1"

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          lfs: false

      # --- Git LFS setup (per-OS, skip-smudge + selective fetch) ---
      - name: Install Git LFS (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y git-lfs
          git lfs install --skip-smudge

      - name: Install Git LFS (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install git-lfs || true
          git lfs install --skip-smudge

      - name: Install Git LFS (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          git lfs install --skip-smudge

      - name: Cache Git LFS objects
        uses: actions/cache@v4
        with:
          path: .git/lfs/objects
          key: ${{ runner.os }}-git-lfs-${{ hashFiles('.gitattributes') }}
          restore-keys: |
            ${{ runner.os }}-git-lfs-

      - name: Fetch LFS objects (non-Windows)
        if: runner.os != 'Windows'
        run: |
          git lfs fetch --include="resources/**,packages/fdl_viewer/tests/expected/**,packages/fdl_viewer/src/fdl_viewer/resources/**,packages/fdl_frameline_generator/src/fdl_frameline_generator/resources/**"
          git lfs checkout

      - name: Fetch LFS objects (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          git lfs fetch --include='resources/**,packages/fdl_viewer/tests/expected/**,packages/fdl_viewer/src/fdl_viewer/resources/**,packages/fdl_frameline_generator/src/fdl_frameline_generator/resources/**'
          git lfs checkout

      # --- Python + uv ---
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      # --- CMake ---
      - name: Install CMake (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y cmake

      - name: Install CMake (macOS)
        if: runner.os == 'macOS'
        run: brew install cmake || true
      # Windows runners already have CMake

      # --- Codegen ---
      - name: Install codegen dependencies
        run: uv pip install pyyaml jinja2 --system

      - name: Run codegen
        run: python scripts/run_codegen.py

      # --- Build native library ---
      - name: Build native library and run C++ tests
        run: python scripts/build_native.py --run-tests

      # --- Python environment ---
      - name: Install Python packages
        run: uv sync --extra dev

      # --- Run Python test suites ---
      - name: Run fdl core tests
        run: uv run pytest native/bindings/python/tests/ -v -n auto -p no:pytest-qt

      - name: Run fdl-imaging tests
        run: uv run pytest packages/fdl_imaging/tests/ -v -n auto -p no:pytest-qt

      - name: Run fdl-frameline-generator tests
        run: uv run pytest packages/fdl_frameline_generator/tests/ -v -p no:pytest-qt

      - name: Run fdl-viewer tests (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb libegl1 libgl1-mesa-dri
          xvfb-run uv run pytest packages/fdl_viewer/tests/ -v

      - name: Run fdl-viewer tests (macOS/Windows)
        if: runner.os != 'Linux'
        run: uv run pytest packages/fdl_viewer/tests/ -v

  # ---------------------------------------------------------------------------
  # Build Artifacts — wheels + FDL Viewer app (nightly + release)
  # ---------------------------------------------------------------------------
  build_artifacts:
    name: Build Artifacts (${{ matrix.os }})
    needs: test
    if: >-
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch' ||
      startsWith(github.ref, 'refs/tags/')
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]

    runs-on: ${{ matrix.os }}
    env:
      CI: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          lfs: false
          fetch-depth: 0

      # Tag-on-main verification (release tags only)
      - name: Verify tag belongs to main
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          git fetch origin main --depth=1
          if ! git merge-base --is-ancestor "$GITHUB_SHA" origin/main; then
            echo "::error::Tag ${GITHUB_REF_NAME} is not on the main branch. Aborting."
            exit 1
          fi
          echo "Tag commit is on main."

      # --- Git LFS setup ---
      - name: Install Git LFS (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y git-lfs
          git lfs install --skip-smudge

      - name: Install Git LFS (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install git-lfs || true
          git lfs install --skip-smudge

      - name: Install Git LFS (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          git lfs install --skip-smudge

      - name: Cache Git LFS objects
        uses: actions/cache@v4
        with:
          path: .git/lfs/objects
          key: build-${{ runner.os }}-git-lfs-${{ hashFiles('.gitattributes') }}
          restore-keys: |
            build-${{ runner.os }}-git-lfs-
            ${{ runner.os }}-git-lfs-

      - name: Fetch LFS objects (non-Windows)
        if: runner.os != 'Windows'
        run: |
          git lfs fetch --include="packages/fdl_viewer/src/fdl_viewer/resources/**,packages/fdl_frameline_generator/src/fdl_frameline_generator/resources/**"
          git lfs checkout

      - name: Fetch LFS objects (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          git lfs fetch --include='packages/fdl_viewer/src/fdl_viewer/resources/**,packages/fdl_frameline_generator/src/fdl_frameline_generator/resources/**'
          git lfs checkout

      # --- Python + uv ---
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      # --- CMake ---
      - name: Install CMake (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y cmake

      - name: Install CMake (macOS)
        if: runner.os == 'macOS'
        run: brew install cmake || true

      # --- Codegen ---
      - name: Install codegen dependencies
        run: uv pip install pyyaml jinja2 --system

      - name: Run codegen
        run: python scripts/run_codegen.py

      # --- Build native library ---
      - name: Build native library
        run: python scripts/build_native.py --no-tests

      # --- Copy native lib into fdl_ffi for wheel bundling ---
      - name: Bundle native library (Linux)
        if: runner.os == 'Linux'
        run: cp native/core/build/libfdl_core.so native/bindings/python/fdl_ffi/

      - name: Bundle native library (macOS)
        if: runner.os == 'macOS'
        run: cp native/core/build/libfdl_core.dylib native/bindings/python/fdl_ffi/

      - name: Bundle native library (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          if [ -f native/core/build/Release/fdl_core.dll ]; then
            cp native/core/build/Release/fdl_core.dll native/bindings/python/fdl_ffi/
          else
            cp native/core/build/fdl_core.dll native/bindings/python/fdl_ffi/
          fi

      # --- Build Python wheels ---
      - name: Create dist directory
        shell: bash
        run: mkdir -p dist

      - name: Install build tools
        run: uv pip install build setuptools wheel hatchling --system

      # fdl wheel (platform-specific — bundles native lib)
      - name: Build fdl wheel
        shell: bash
        run: |
          cd native/bindings/python
          python -m build --wheel --outdir ../../../dist/

      # fdl-imaging wheel (pure Python)
      - name: Build fdl-imaging wheel
        shell: bash
        run: |
          cd packages/fdl_imaging
          python -m build --wheel --outdir ../../dist/

      # fdl-frameline-generator wheel (pure Python)
      - name: Build fdl-frameline-generator wheel
        shell: bash
        run: |
          cd packages/fdl_frameline_generator
          python -m build --wheel --outdir ../../dist/

      # fdl-viewer wheel (pure Python)
      - name: Build fdl-viewer wheel
        shell: bash
        run: |
          cd packages/fdl_viewer
          python -m build --wheel --outdir ../../dist/

      # --- Build FDL Viewer standalone application ---
      - name: Install all Python packages
        run: uv sync --extra dev

      - name: Install PyInstaller
        run: uv pip install pyinstaller --system

      - name: Build FDL Viewer application
        run: python packages/fdl_viewer/compile.py --no-sign --no-dmg

      # --- Package FDL Viewer application for upload ---
      - name: Package FDL Viewer (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          cd packages/fdl_viewer/dist
          tar czf ../../../dist/FDL-Viewer-Linux-x86_64.tar.gz "FDL Viewer"

      - name: Package FDL Viewer (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          cd packages/fdl_viewer/dist
          tar czf ../../../dist/FDL-Viewer-macOS.tar.gz "FDL Viewer.app"

      - name: Package FDL Viewer (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path "packages/fdl_viewer/dist/FDL Viewer" -DestinationPath "dist/FDL-Viewer-Windows-x64.zip"

      # --- Upload build artifacts ---
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ runner.os }}
          path: dist/*
          if-no-files-found: warn

  # ---------------------------------------------------------------------------
  # Create GitHub Release & Attach Artifacts (tag pushes only)
  # ---------------------------------------------------------------------------
  publish_release:
    name: Create GitHub Release
    needs: build_artifacts
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Create Release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          draft: false
          prerelease: false
          files: |
            release-assets/**
