name: CI/CD Workflow

permissions:
  contents: write
  checks: write

on:
  push:
    branches:
      - '**'
    tags:
      - 'v*'
  pull_request:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch: {}

jobs:
  # ---------------------------------------------------------------------------
  # Tests
  # ---------------------------------------------------------------------------
  test:
    name: Tests (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]

    runs-on: ${{ matrix.os }}
    env:
      CI: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          lfs: false

      # Placeholder: future test steps go here
      - name: Validate environment
        run: echo "Running on ${{ matrix.os }} - environment OK"

      - name: Run tests
        run: echo "No tests configured yet - skipping"

  # ---------------------------------------------------------------------------
  # Nightly Build & Artifact Upload
  # ---------------------------------------------------------------------------
  nightly_build:
    name: Nightly Build (${{ matrix.os }})
    needs: test
    if: ${{ github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]

    runs-on: ${{ matrix.os }}
    env:
      CI: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          lfs: false

      # Placeholder: future build steps go here
      - name: Build
        run: echo "No build configured yet - skipping"

      # Placeholder: future artifact upload steps go here
      # - name: Upload artifact
      #   uses: actions/upload-artifact@v6
      #   with:
      #     name: nightly-${{ runner.os }}
      #     path: './dist/*'

  # ---------------------------------------------------------------------------
  # Release Build & Artifact Upload (tag pushes only)
  # ---------------------------------------------------------------------------
  release_build:
    name: Release Build (${{ matrix.os }})
    needs: test
    if: startsWith(github.ref, 'refs/tags/')
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]

    runs-on: ${{ matrix.os }}
    env:
      CI: true

    steps:
      - name: Checkout tagged commit
        uses: actions/checkout@v6
        with:
          ref: ${{ github.ref }}
          lfs: false
          fetch-depth: 0

      - name: Verify tag belongs to main
        shell: bash
        run: |
          git fetch origin main --depth=1
          if ! git merge-base --is-ancestor "$GITHUB_SHA" origin/main; then
            echo "Tag ${GITHUB_REF_NAME} is not on the main branch history. Aborting release."
            exit 1
          fi
          echo "Tag commit is on main."

      # Placeholder: future build steps go here
      - name: Build
        run: echo "No build configured yet - skipping"

      # Placeholder: future artifact upload steps go here
      # - name: Upload artifact
      #   uses: actions/upload-artifact@v6
      #   with:
      #     name: release-${{ runner.os }}
      #     path: './dist/*'

  # ---------------------------------------------------------------------------
  # Create GitHub Release & Attach Artifacts (tag pushes only)
  # ---------------------------------------------------------------------------
  publish_release:
    name: Create GitHub Release (${{ matrix.os }})
    needs: release_build
    if: startsWith(github.ref, 'refs/tags/')
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v7
        with:
          path: release-assets
          merge-multiple: true

      - name: Create Release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          draft: false
          prerelease: false
          files: |
            release-assets/**
