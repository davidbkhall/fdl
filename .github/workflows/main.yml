name: CI/CD Workflow

permissions:
  contents: write
  checks: write

on:
  push:
    branches:
      - '**'
    tags:
      - 'v*'
  pull_request:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch: {}

jobs:
  # ---------------------------------------------------------------------------
  # Lint — fast gate before tests
  # ---------------------------------------------------------------------------
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      # --- Python linting ---
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Run ruff check
        run: uvx ruff check .

      - name: Run ruff format check
        run: uvx ruff format --check .

      # --- C++ linting ---
      - name: Install clang tools
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-format clang-tidy

      - name: Run clang-format check
        run: |
          find native/core/src native/core/include native/core/tests \
            -type f \( -name '*.cpp' -o -name '*.h' -o -name '*.hpp' \) \
            -print0 | xargs -0 -P"$(nproc)" -n 5 clang-format --dry-run --Werror

      - name: Install CMake
        run: sudo apt-get install -y cmake

      - name: Install codegen dependencies
        run: uv pip install pyyaml jinja2 --system

      - name: Run codegen
        run: python scripts/run_codegen.py

      - name: CMake configure (for compile_commands.json)
        run: |
          cmake -S native/core -B native/core/build \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON \
            -DFDL_BUILD_TESTS=OFF

      - name: Run clang-tidy
        run: run-clang-tidy -p native/core/build -j"$(nproc)" native/core/src/

  # ---------------------------------------------------------------------------
  # Tests — gate for all downstream jobs
  # ---------------------------------------------------------------------------
  test:
    name: Tests (${{ matrix.os }})
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]

    runs-on: ${{ matrix.os }}
    env:
      CI: true
      CICD: "1"

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          lfs: false

      # --- Git LFS setup (per-OS, skip-smudge + selective fetch) ---
      - name: Install Git LFS (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y git-lfs
          git lfs install --skip-smudge

      - name: Install Git LFS (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install git-lfs || true
          git lfs install --skip-smudge

      - name: Install Git LFS (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          git lfs install --skip-smudge

      - name: Cache Git LFS objects
        uses: actions/cache@v4
        with:
          path: .git/lfs/objects
          key: ${{ runner.os }}-git-lfs-${{ hashFiles('.gitattributes') }}
          restore-keys: |
            ${{ runner.os }}-git-lfs-

      - name: Fetch LFS objects (non-Windows)
        if: runner.os != 'Windows'
        run: |
          git lfs fetch --include="resources/FDL/Original_Source_Files/**,resources/FDL/New_Source_Files/**,resources/FDL/EdgeCases/**,resources/FDL/Scenarios_For_Implementers/**,packages/fdl_viewer/tests/expected/**,packages/fdl_viewer/src/fdl_viewer/resources/**,packages/fdl_frameline_generator/src/fdl_frameline_generator/resources/**"
          git lfs checkout

      - name: Fetch LFS objects (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          git lfs fetch --include='resources/FDL/Original_Source_Files/**,resources/FDL/New_Source_Files/**,resources/FDL/EdgeCases/**,resources/FDL/Scenarios_For_Implementers/**,packages/fdl_viewer/tests/expected/**,packages/fdl_viewer/src/fdl_viewer/resources/**,packages/fdl_frameline_generator/src/fdl_frameline_generator/resources/**'
          git lfs checkout

      # --- Python + uv ---
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      # --- CMake ---
      - name: Install CMake (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y cmake

      - name: Install CMake (macOS)
        if: runner.os == 'macOS'
        run: brew install cmake || true
      # Windows runners already have CMake

      # --- Codegen ---
      - name: Install codegen dependencies
        run: uv pip install pyyaml jinja2 --system

      - name: Run codegen
        run: python scripts/run_codegen.py

      # --- Build native library ---
      - name: Build native library and run C++ tests
        run: python scripts/build_native.py --run-tests

      # --- Python environment ---
      - name: Install Python packages
        run: uv sync --extra dev

      # --- Run Python test suites ---
      - name: Run fdl core tests
        run: uv run pytest native/bindings/python/tests/ -v -n auto -p no:pytest-qt

      - name: Run fdl-imaging tests
        run: uv run pytest packages/fdl_imaging/tests/ -v -n auto -p no:pytest-qt

      - name: Run fdl-frameline-generator tests
        run: uv run pytest packages/fdl_frameline_generator/tests/ -v -p no:pytest-qt

      - name: Install Qt dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y libegl1 libxkbcommon0

      - name: Run fdl-viewer tests (Linux)
        if: runner.os == 'Linux'
        env:
          QT_QPA_PLATFORM: offscreen
        run: uv run pytest packages/fdl_viewer/tests/ -v

      - name: Run fdl-viewer tests (macOS/Windows)
        if: runner.os != 'Linux'
        run: uv run pytest packages/fdl_viewer/tests/ -v

  # ---------------------------------------------------------------------------
  # Build Artifacts — wheels + FDL Viewer app (nightly + release)
  # ---------------------------------------------------------------------------
  build_artifacts:
    name: Build Artifacts (${{ matrix.os }})
    needs: test
    if: >-
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch' ||
      startsWith(github.ref, 'refs/tags/')
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]

    runs-on: ${{ matrix.os }}
    env:
      CI: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          lfs: false
          fetch-depth: 0

      # Tag-on-main verification (release tags only)
      - name: Verify tag belongs to main
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          git fetch origin main --depth=1
          if ! git merge-base --is-ancestor "$GITHUB_SHA" origin/main; then
            echo "::error::Tag ${GITHUB_REF_NAME} is not on the main branch. Aborting."
            exit 1
          fi
          echo "Tag commit is on main."

      # --- Git LFS setup ---
      - name: Install Git LFS (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y git-lfs
          git lfs install --skip-smudge

      - name: Install Git LFS (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install git-lfs || true
          git lfs install --skip-smudge

      - name: Install Git LFS (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          git lfs install --skip-smudge

      - name: Cache Git LFS objects
        uses: actions/cache@v4
        with:
          path: .git/lfs/objects
          key: build-${{ runner.os }}-git-lfs-${{ hashFiles('.gitattributes') }}
          restore-keys: |
            build-${{ runner.os }}-git-lfs-
            ${{ runner.os }}-git-lfs-

      - name: Fetch LFS objects (non-Windows)
        if: runner.os != 'Windows'
        run: |
          git lfs fetch --include="packages/fdl_viewer/src/fdl_viewer/resources/**,packages/fdl_frameline_generator/src/fdl_frameline_generator/resources/**"
          git lfs checkout

      - name: Fetch LFS objects (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          git lfs fetch --include='packages/fdl_viewer/src/fdl_viewer/resources/**,packages/fdl_frameline_generator/src/fdl_frameline_generator/resources/**'
          git lfs checkout

      # --- Python + uv ---
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      # --- CMake ---
      - name: Install CMake (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y cmake

      - name: Install CMake (macOS)
        if: runner.os == 'macOS'
        run: brew install cmake || true

      # --- Codegen ---
      - name: Install codegen dependencies
        run: uv pip install pyyaml jinja2 --system

      - name: Run codegen
        run: python scripts/run_codegen.py

      # --- Build native library ---
      - name: Build native library
        run: python scripts/build_native.py --no-tests

      # --- Copy native lib into fdl_ffi for wheel bundling ---
      - name: Bundle native library (Linux)
        if: runner.os == 'Linux'
        run: cp native/core/build/libfdl_core.so native/bindings/python/fdl_ffi/

      - name: Bundle native library (macOS)
        if: runner.os == 'macOS'
        run: cp native/core/build/libfdl_core.dylib native/bindings/python/fdl_ffi/

      - name: Bundle native library (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          if [ -f native/core/build/Release/fdl_core.dll ]; then
            cp native/core/build/Release/fdl_core.dll native/bindings/python/fdl_ffi/
          else
            cp native/core/build/fdl_core.dll native/bindings/python/fdl_ffi/
          fi

      # --- Build FDL Viewer standalone application (before wheels, so host .so is used) ---
      - name: Create dist directory
        shell: bash
        run: mkdir -p dist

      - name: Install all Python packages
        run: uv sync --extra dev

      - name: Install PyInstaller
        run: uv pip install pyinstaller

      - name: Build FDL Viewer application (macOS)
        if: runner.os == 'macOS'
        run: uv run python packages/fdl_viewer/compile.py --no-sign

      - name: Build FDL Viewer application (Windows)
        if: runner.os == 'Windows'
        run: uv run python packages/fdl_viewer/compile.py --no-sign --no-dmg

      - name: Build FDL Viewer application (Linux)
        if: runner.os == 'Linux'
        run: uv run python packages/fdl_viewer/compile.py --no-sign --no-dmg

      # --- Package FDL Viewer application ---
      - name: Package FDL Viewer (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          cp packages/fdl_viewer/dist/*.dmg dist/

      - name: Package FDL Viewer (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path "packages/fdl_viewer/dist/FDL Viewer" -DestinationPath "dist/FDL_Viewer-${{ runner.os }}-${{ runner.arch }}.zip"

      - name: Package FDL Viewer (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          tar -czf "dist/FDL_Viewer-${{ runner.os }}-${{ runner.arch }}.tar.gz" -C packages/fdl_viewer/dist "FDL Viewer"

      # --- Build Python wheels ---
      - name: Install build tools
        run: uv pip install build setuptools wheel hatchling --system

      # Pure Python wheels (all platforms)
      - name: Build fdl-imaging wheel
        shell: bash
        run: |
          cd packages/fdl_imaging
          python -m build --wheel --outdir ../../dist/

      - name: Build fdl-frameline-generator wheel
        shell: bash
        run: |
          cd packages/fdl_frameline_generator
          python -m build --wheel --outdir ../../dist/

      - name: Build fdl-viewer wheel
        shell: bash
        run: |
          cd packages/fdl_viewer
          python -m build --wheel --outdir ../../dist/

      # fdl wheel (platform-specific — bundles native lib)
      - name: Build fdl wheel (macOS/Windows)
        if: runner.os != 'Linux'
        shell: bash
        run: |
          cd native/bindings/python
          python -m build --wheel --outdir ../../../dist/

      # Linux fdl wheel — built inside manylinux container for PyPI compatibility
      - name: Build fdl wheel (Linux manylinux)
        if: runner.os == 'Linux'
        run: |
          docker run --rm -v ${{ github.workspace }}:/workspace \
            quay.io/pypa/manylinux_2_28_x86_64 bash -c '
              cd /workspace
              export PATH=/opt/python/cp312-cp312/bin:$PATH
              pip install cmake pyyaml jinja2 build setuptools wheel auditwheel
              python scripts/run_codegen.py
              rm -rf native/core/build
              python scripts/build_native.py --no-tests
              cp native/core/build/libfdl_core.so native/bindings/python/fdl_ffi/
              cd native/bindings/python
              python -m build --wheel --outdir /workspace/dist/
              cd /workspace
              auditwheel repair dist/fdl-*-linux_*.whl --wheel-dir dist/
              rm dist/fdl-*-linux_*.whl
            '

      # --- Upload build artifacts ---
      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ runner.os }}-${{ runner.arch }}
          path: dist/*.whl
          if-no-files-found: warn
          retention-days: 2

      - name: Upload FDL Viewer app
        uses: actions/upload-artifact@v4
        with:
          name: FDL_Viewer-${{ runner.os }}-${{ runner.arch }}
          path: |
            dist/*.dmg
            dist/*.zip
            dist/*.tar.gz
          if-no-files-found: warn
          retention-days: 2

  # ---------------------------------------------------------------------------
  # Package Scenario Resources (platform-independent, runs once)
  # ---------------------------------------------------------------------------
  package_scenarios:
    name: Package Scenario Resources
    needs: test
    if: >-
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch' ||
      startsWith(github.ref, 'refs/tags/')
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          lfs: false

      - name: Install Git LFS
        run: |
          brew install git-lfs || true
          git lfs install --skip-smudge

      - name: Cache Git LFS objects
        uses: actions/cache@v4
        with:
          path: .git/lfs/objects
          key: scenarios-git-lfs-${{ hashFiles('.gitattributes') }}
          restore-keys: |
            build-macOS-git-lfs-
            macOS-git-lfs-

      - name: Fetch LFS objects
        run: |
          git lfs fetch --include="resources/FDL/Original_Source_Files/**,resources/FDL/New_Source_Files/**,resources/FDL/EdgeCases/**,resources/FDL/Scenarios_For_Implementers/**"
          git lfs checkout

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build scenario resources zip
        run: python scripts/zip_scenario_resources.py -o Scenarios_For_Implementers.zip

      - name: Upload scenario resources
        uses: actions/upload-artifact@v4
        with:
          name: Scenarios_For_Implementers
          path: Scenarios_For_Implementers.zip
          if-no-files-found: error
          retention-days: 2

  # ---------------------------------------------------------------------------
  # Create GitHub Release & Attach Artifacts (tag pushes only)
  # ---------------------------------------------------------------------------
  publish_release:
    name: Create GitHub Release
    needs: [build_artifacts, package_scenarios]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Create Release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          draft: false
          prerelease: false
          files: |
            release-assets/**
