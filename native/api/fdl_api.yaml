    params:
      - { name: doc, type: "const fdl_doc_t*" }
    doc: Get the fdl_creator. Returns NULL if not present.

  - name: fdl_doc_get_default_framing_intent
    category: accessor
    returns: "const char*"
    ownership: valid_until_doc_freed
    params:
      - { name: doc, type: "const fdl_doc_t*" }
    doc: Get the default_framing_intent. Returns NULL if not present.

  - name: fdl_doc_get_version_major
