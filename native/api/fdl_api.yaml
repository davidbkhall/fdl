  - name: fdl_apply_canvas_template
    category: pipeline
    returns: fdl_template_result_t
    params:
      - { name: tmpl,                  type: "const fdl_canvas_template_t*" }
      - { name: source_canvas,         type: "const fdl_canvas_t*" }
      - { name: source_framing,        type: "const fdl_framing_decision_t*" }
      - { name: new_canvas_id,         type: "const char*" }
      - { name: new_fd_name,           type: "const char*" }
      - { name: source_context_label,  type: "const char*", nullable: true }
      - { name: context_creator,       type: "const char*", nullable: true }
    doc: Apply a canvas template to a source canvas/framing. Returns template_result_t. Caller must free with fdl_template_result_free.

  - name: fdl_template_result_free
    category: memory
    returns: void
    params:
      - { name: result, type: "fdl_template_result_t*", nullable: true }
    doc: Free a template result (doc + error string). Safe to call with NULL.

  - name: fdl_context_resolve_canvas_for_dimensions
    category: collections
    returns: fdl_resolve_canvas_result_t
    params:
      - { name: ctx,        type: "fdl_context_t*" }
      - { name: input_dims, type: fdl_dimensions_f64_t }
      - { name: canvas,     type: "fdl_canvas_t*" }
      - { name: framing,    type: "fdl_framing_decision_t*" }
    doc: Resolve canvas for given input dimensions. Returns non-owning handles. Caller must free error with fdl_free.

  # === Document builder ===
  - name: fdl_doc_add_framing_intent
    category: builder
    returns: "fdl_framing_intent_t*"
    ownership: valid_until_doc_freed
    params:
      - { name: doc,        type: "fdl_doc_t*" }
      - { name: id,         type: "const char*" }
      - { name: label,      type: "const char*" }
      - { name: aspect_w,   type: int64_t }
      - { name: aspect_h,   type: int64_t }
      - { name: protection, type: double }
    doc: Add a framing intent to the document. Returns handle (owned by doc).

  - name: fdl_doc_add_context
    category: builder
    returns: "fdl_context_t*"
    ownership: valid_until_doc_freed
    params:
      - { name: doc,             type: "fdl_doc_t*" }
      - { name: label,           type: "const char*" }
      - { name: context_creator, type: "const char*", nullable: true }
    doc: Add a context to the document. Returns handle (owned by doc).

  - name: fdl_doc_add_canvas_template
    category: builder
    returns: "fdl_canvas_template_t*"
    ownership: valid_until_doc_freed
    params:
      - { name: doc,            type: "fdl_doc_t*" }
      - { name: id,             type: "const char*" }
      - { name: label,          type: "const char*" }
      - { name: target_w,       type: int64_t }
      - { name: target_h,       type: int64_t }
      - { name: target_squeeze, type: double }
      - { name: fit_source,     type: fdl_geometry_path_t }
      - { name: fit_method,     type: fdl_fit_method_t }
      - { name: halign,         type: fdl_halign_t }
      - { name: valign,         type: fdl_valign_t }
      - { name: rounding,       type: fdl_round_strategy_t }
    doc: Add a canvas template to the document. Returns handle (owned by doc).

  - name: fdl_canvas_template_set_preserve_from_source_canvas
    category: setter
    returns: void
    params:
      - { name: ct,   type: "fdl_canvas_template_t*" }
      - { name: path, type: fdl_geometry_path_t }
    doc: Set preserve_from_source_canvas on a canvas template.

  - name: fdl_canvas_template_set_maximum_dimensions
    category: setter
    returns: void
    params:
      - { name: ct,   type: "fdl_canvas_template_t*" }
      - { name: dims, type: fdl_dimensions_i64_t }
    doc: Set maximum_dimensions on a canvas template.

  - name: fdl_canvas_template_set_pad_to_maximum
    category: setter
    returns: void
    params:
      - { name: ct,  type: "fdl_canvas_template_t*" }
      - { name: pad, type: int }
    doc: Set pad_to_maximum on a canvas template.

  - name: fdl_context_add_canvas
    category: builder
    returns: "fdl_canvas_t*"
    ownership: valid_until_doc_freed
    params:
      - { name: ctx,              type: "fdl_context_t*" }
      - { name: id,               type: "const char*" }
      - { name: label,            type: "const char*" }
      - { name: source_canvas_id, type: "const char*" }
      - { name: dim_w,            type: int64_t }
      - { name: dim_h,            type: int64_t }
      - { name: squeeze,          type: double }
    doc: Add a canvas to a context. Returns handle (owned by doc).

  - name: fdl_canvas_set_effective_dimensions
    category: setter
    returns: void
    params:
      - { name: canvas, type: "fdl_canvas_t*" }
      - { name: dims,   type: fdl_dimensions_i64_t }
      - { name: anchor, type: fdl_point_f64_t }
    doc: Set effective dimensions and anchor on a canvas.

  - name: fdl_canvas_set_photosite_dimensions
    category: setter
    returns: void
    params:
      - { name: canvas, type: "fdl_canvas_t*" }
      - { name: dims,   type: fdl_dimensions_i64_t }
    doc: Set photosite dimensions on a canvas.

  - name: fdl_canvas_set_physical_dimensions
    category: setter
    returns: void
    params:
      - { name: canvas, type: "fdl_canvas_t*" }
      - { name: dims,   type: fdl_dimensions_f64_t }
    doc: Set physical dimensions on a canvas.

  - name: fdl_canvas_add_framing_decision
    category: builder
    returns: "fdl_framing_decision_t*"
    ownership: valid_until_doc_freed
    params:
      - { name: canvas,            type: "fdl_canvas_t*" }
      - { name: id,                type: "const char*" }
      - { name: label,             type: "const char*" }
      - { name: framing_intent_id, type: "const char*" }
      - { name: dim_w,             type: double }
      - { name: dim_h,             type: double }
      - { name: anchor_x,          type: double }
      - { name: anchor_y,          type: double }
    doc: Add a framing decision to a canvas. Returns handle (owned by doc).

  - name: fdl_framing_decision_set_protection
    category: setter
    returns: void
    params:
      - { name: fd,     type: "fdl_framing_decision_t*" }
      - { name: dims,   type: fdl_dimensions_f64_t }
      - { name: anchor, type: fdl_point_f64_t }
    doc: Set protection dimensions and anchor on a framing decision.

  # === FramingIntent setters ===
  - name: fdl_framing_intent_set_aspect_ratio
    category: setter
    returns: void
    params:
      - { name: fi,   type: "fdl_framing_intent_t*" }
      - { name: dims, type: fdl_dimensions_i64_t }
    doc: Set aspect ratio on a framing intent.

  - name: fdl_framing_intent_set_protection
    category: setter
    returns: void
    params:
      - { name: fi,         type: "fdl_framing_intent_t*" }
      - { name: protection, type: double }
    doc: Set protection factor on a framing intent.

  # === Canvas setters ===
  - name: fdl_canvas_set_dimensions
    category: setter
    returns: void
    params:
      - { name: canvas, type: "fdl_canvas_t*" }
      - { name: dims,   type: fdl_dimensions_i64_t }
    doc: Set dimensions on a canvas.

  - name: fdl_canvas_set_anamorphic_squeeze
    category: setter
    returns: void
    params:
      - { name: canvas,  type: "fdl_canvas_t*" }
      - { name: squeeze, type: double }
    doc: Set anamorphic squeeze on a canvas.

  - name: fdl_canvas_set_effective_dims_only
    category: setter
    returns: void
    params:
      - { name: canvas, type: "fdl_canvas_t*" }
      - { name: dims,   type: fdl_dimensions_i64_t }
    doc: Set effective dimensions on a canvas (creates anchor at {0,0} if missing).

  - name: fdl_canvas_remove_effective
    category: setter
    returns: void
    params:
      - { name: canvas, type: "fdl_canvas_t*" }
    doc: Remove effective dimensions and anchor from a canvas.

  # === FramingDecision individual setters ===
  - name: fdl_framing_decision_set_dimensions
    category: setter
    returns: void
    params:
      - { name: fd,   type: "fdl_framing_decision_t*" }
      - { name: dims, type: fdl_dimensions_f64_t }
    doc: Set dimensions on a framing decision.

  - name: fdl_framing_decision_set_anchor_point
    category: setter
    returns: void
    params:
      - { name: fd,    type: "fdl_framing_decision_t*" }
      - { name: point, type: fdl_point_f64_t }
    doc: Set anchor point on a framing decision.

  - name: fdl_framing_decision_set_protection_dimensions
    category: setter
    returns: void
    params:
      - { name: fd,   type: "fdl_framing_decision_t*" }
      - { name: dims, type: fdl_dimensions_f64_t }
    doc: Set protection dimensions on a framing decision.

  - name: fdl_framing_decision_set_protection_anchor_point
    category: setter
    returns: void
    params:
      - { name: fd,    type: "fdl_framing_decision_t*" }
      - { name: point, type: fdl_point_f64_t }
    doc: Set protection anchor point on a framing decision.

  - name: fdl_framing_decision_remove_protection
    category: setter
    returns: void
    params:
      - { name: fd, type: "fdl_framing_decision_t*" }
    doc: Remove protection dimensions and anchor from a framing decision.

  # === Framing decision business logic ===
  - name: fdl_framing_decision_adjust_anchor
    category: pipeline
    returns: void
    params:
      - { name: fd,      type: "fdl_framing_decision_t*" }
      - { name: canvas,  type: "const fdl_canvas_t*" }
      - { name: h_align, type: fdl_halign_t }
      - { name: v_align, type: fdl_valign_t }
    doc: Adjust anchor_point on a framing decision based on alignment within canvas.

  - name: fdl_framing_decision_adjust_protection_anchor
    category: pipeline
    returns: void
    params:
      - { name: fd,      type: "fdl_framing_decision_t*" }
      - { name: canvas,  type: "const fdl_canvas_t*" }
      - { name: h_align, type: fdl_halign_t }
      - { name: v_align, type: fdl_valign_t }
    doc: Adjust protection_anchor_point on a framing decision based on alignment within canvas.

  - name: fdl_framing_decision_populate_from_intent
    category: pipeline
    returns: void
    params:
      - { name: fd,       type: "fdl_framing_decision_t*" }
      - { name: canvas,   type: "const fdl_canvas_t*" }
      - { name: intent,   type: "const fdl_framing_intent_t*" }
      - { name: rounding, type: fdl_round_strategy_t }
    doc: Populate a framing decision from a canvas and framing intent.

  # === clip_id setter / remover / validator ===
  - name: fdl_context_set_clip_id_json
    category: setter
    returns: "const char*"
    ownership: caller_frees
    nullable: true
    params:
      - { name: ctx, type: "fdl_context_t*" }
      - { name: json_str, type: "const char*" }
      - { name: json_len, type: size_t }
    doc: Set clip_id on context from JSON. Returns NULL on success, error on failure.

  - name: fdl_context_remove_clip_id
    category: setter
    returns: void
    params:
      - { name: ctx, type: "fdl_context_t*" }
    doc: Remove clip_id from context.

  - name: fdl_clip_id_validate_json
    category: validation
    returns: "const char*"
    ownership: caller_frees
    nullable: true
    params:
      - { name: json_str, type: "const char*" }
      - { name: json_len, type: size_t }
    doc: Validate clip_id JSON for mutual exclusion. Returns NULL if valid.

  # === Validation ===
  - name: fdl_doc_validate
    category: validation
    returns: "fdl_validation_result_t*"
    ownership: caller_frees_with_fdl_validation_result_free
    params:
      - { name: doc, type: "const fdl_doc_t*" }
    doc: Run schema (Draft 2020-12) and semantic validators. Returns a result handle.

  - name: fdl_validation_result_error_count
    category: validation
    returns: uint32_t
    params:
      - { name: result, type: "const fdl_validation_result_t*" }
    doc: Get the number of validation errors.

  - name: fdl_validation_result_error_at
    category: validation
    returns: "const char*"
    ownership: valid_until_result_freed
    nullable: true
    params:
      - { name: result, type: "const fdl_validation_result_t*" }
      - { name: index,  type: uint32_t }
    doc: Get a specific error message by index. Returns NULL if index is out of range.

  - name: fdl_validation_result_free
    category: memory
    returns: void
    params:
      - { name: result, type: "fdl_validation_result_t*", nullable: true }
    doc: Free a validation result. Safe to call with NULL.

  # === Memory management ===
  - name: fdl_free
    category: memory
    returns: void
    params:
      - { name: ptr, type: "void*", nullable: true }
    doc: Free memory allocated by fdl_core functions.

# -----------------------------------------------------------------------
# Auxiliary types (error classes, version, etc.)
# -----------------------------------------------------------------------
auxiliary_types:
  errors:
    - name: FDLError
      parent: Exception
      doc: Base error for FDL operations.
    - name: FDLValidationError
      parent: FDLError
      doc: Raised when FDL validation fails.

  version:
    class_name: Version
    doc: FDL document version (major, minor).
    slots:
      - { name: major, type: int, default: 2 }
      - { name: minor, type: int, default: 0 }

  dataclasses:
    TemplateResult:
      doc: Result of applying a canvas template.
      fields:
        - { name: fdl,                   type: object }
        - { name: scale_factor,          type: float }
        - { name: scaled_bounding_box,   type: DimensionsFloat }
        - { name: content_translation,   type: PointFloat }
        - { name: context_label,         type: str,   private: true }
        - { name: canvas_id,             type: str,   private: true }
        - { name: framing_decision_id,   type: str,   private: true }
      accessors:
        - name: context
          returns: Context
          doc: The new context created by the template apply.
          lookup: by_label
          collection: fdl.contexts
          key_field: context_label
        - name: canvas
          returns: Canvas
          doc: The new canvas created by the template apply.
          lookup: by_id
          collection: context.canvases
          key_field: canvas_id
        - name: framing_decision
          returns: FramingDecision
          doc: The new framing decision created by the template apply.
          lookup: by_id
          collection: canvas.framing_decisions
          key_field: framing_decision_id

    ResolveCanvasResult:
      doc: Result of resolving canvas for given input dimensions.
      fields:
        - { name: canvas,           type: Canvas }
        - { name: framing_decision, type: FramingDecision }
        - { name: was_resolved,     type: bool }

  # json_wrappers: ClipID and FileSequence moved to object_model as handle-based classes

# Free functions exposed as top-level functions in target language bindings
free_functions:
  - name: fdl_round
    display_name: fdl_round
    c_function: fdl_round
    doc: Round a single float value according to FDL rounding rules.
    params:
      - { name: value, type: f64 }
      - { name: even, type: rounding_even }
      - { name: mode, type: rounding_mode }
    returns: int

  - name: calculate_scale_factor
    display_name: calculate_scale_factor
    c_function: fdl_calculate_scale_factor
    doc: Calculate scale factor based on fit method.
    params:
      - { name: fit_norm, type: fdl_dimensions_f64_t }
      - { name: target_norm, type: fdl_dimensions_f64_t }
      - { name: fit_method, type: fit_method }
    returns: float

  - name: make_rect
    display_name: make_rect
    c_function: fdl_make_rect
    module: utils
    doc: Create a rect from raw coordinates.
    params:
      - { name: x, type: double }
      - { name: y, type: double }
      - { name: width, type: double }
      - { name: height, type: double }
    returns: fdl_rect_t

# -----------------------------------------------------------------------
# Utility functions (generated per-language)
# -----------------------------------------------------------------------
utilities:
  - name: get_dimensions_from_path
    kind: c_abi
    c_function: fdl_resolve_geometry_layer
    extract: dims
    doc: Get dimensions from a canvas or framing decision using a GeometryPath string.
  - name: get_anchor_from_path
    kind: c_abi
    c_function: fdl_resolve_geometry_layer
    extract: anchor
    doc: Get anchor point from a canvas or framing decision using a GeometryPath string.
  - name: find_by_id
    kind: collection_find
    doc: Find an item in a collection by its id field.
  - name: find_by_label
    kind: collection_find
    doc: Find an item in a collection by its label field.
  - name: read_from_string
    kind: io
    doc: Parse an FDL document from a JSON string.
  - name: read_from_file
    kind: io
    doc: Read an FDL document from a file on disk.
  - name: write_to_string
    kind: io
    doc: Serialize an FDL document to a JSON string.
  - name: write_to_file
    kind: io
    doc: Write an FDL document to a file on disk.
  - name: set_rounding
    kind: rounding_state
    doc: Set the global default rounding strategy.
  - name: get_rounding
    kind: rounding_state
    doc: Get the current global default rounding strategy.
  - name: DEFAULT_ROUNDING_STRATEGY
    kind: constant
    doc: Default rounding strategy (even + up).
