      - { name: indent, type: int }
    doc: Serialize framing intent to canonical JSON string. Caller owns (free with fdl_free).

  - name: fdl_canvas_template_to_json
    category: accessor
    returns: "char*"
    ownership: caller_frees
    params:
      - { name: ct,     type: "const fdl_canvas_template_t*" }
      - { name: indent, type: int }
    doc: Serialize canvas template to canonical JSON string. Caller owns (free with fdl_free).

  # === Document header accessors ===
  - name: fdl_doc_get_uuid
    category: accessor
    returns: "const char*"
    ownership: valid_until_doc_freed
    params:
      - { name: doc, type: "const fdl_doc_t*" }
    doc: Get the UUID. Returns NULL if not present.

  - name: fdl_doc_get_fdl_creator
