      - { name: out_delta,  type: "fdl_point_f64_t*", direction: out }
    doc: Clamp dimensions to maximum bounds. Delta offset written to out_delta.

  # === Framing from intent ===
  - name: fdl_compute_framing_from_intent
    category: pipeline
    returns: fdl_from_intent_result_t
    params:
      - { name: canvas_dims,  type: fdl_dimensions_f64_t }
      - { name: working_dims, type: fdl_dimensions_f64_t }
      - { name: squeeze,      type: double }
      - { name: aspect_ratio, type: fdl_dimensions_i64_t }
      - { name: protection,   type: double }
      - { name: rounding,     type: fdl_round_strategy_t }
    doc: Compute a framing decision from a framing intent.

  # === Document lifecycle ===
  - name: fdl_doc_create
    category: lifecycle
    returns: "fdl_doc_t*"
    ownership: caller_frees_with_fdl_doc_free
    params: []
    doc: Create an empty FDL document. Returns NULL on allocation failure.

  - name: fdl_doc_free
    category: memory
    returns: void
    params:
      - { name: doc, type: "fdl_doc_t*", nullable: true }
    doc: Free an FDL document. Safe to call with NULL.

  - name: fdl_doc_parse_json
    category: lifecycle
    returns: fdl_parse_result_t
    params:
      - { name: json_str, type: "const char*" }
      - { name: json_len, type: size_t }
    doc: Parse a JSON string into an FDL document. On success result.doc is non-NULL. On failure result.error is non-NULL (free with fdl_free).

  - name: fdl_doc_to_json
    category: accessor
    returns: "char*"
    ownership: caller_frees
    params:
      - { name: doc,    type: "const fdl_doc_t*" }
      - { name: indent, type: int }
    doc: Serialize document to canonical JSON string. Caller owns the returned string (free with fdl_free).

  - name: fdl_context_to_json
    category: accessor
    returns: "char*"
    ownership: caller_frees
    params:
      - { name: ctx,    type: "const fdl_context_t*" }
      - { name: indent, type: int }
    doc: Serialize context sub-object to canonical JSON string. Caller owns (free with fdl_free).

  - name: fdl_canvas_to_json
    category: accessor
    returns: "char*"
    ownership: caller_frees
    params:
      - { name: canvas, type: "const fdl_canvas_t*" }
      - { name: indent, type: int }
    doc: Serialize canvas sub-object to canonical JSON string. Caller owns (free with fdl_free).

  - name: fdl_framing_decision_to_json
    category: accessor
    returns: "char*"
    ownership: caller_frees
    params:
      - { name: fd,     type: "const fdl_framing_decision_t*" }
      - { name: indent, type: int }
    doc: Serialize framing decision to canonical JSON string. Caller owns (free with fdl_free).

  - name: fdl_framing_intent_to_json
